# OpenBook branding strings (legacy .properties form).
# Mirrors browser/branding/<channel>/locales/en-US/brand.properties so the
# branding patch can drop it straight in. The Fluent file brand.ftl is the
# modern counterpart; both are shipped because parts of the tree still read
# brand.properties. No Firefox/Mozilla trademark may appear here (§13).

brandShorterName=OpenBook
brandShortName=OpenBook
brandFullName=OpenBook
# Vendor strings. OpenBook is its own vendor, not Mozilla.
vendorShortName=OpenBook

# Used in "Send to Device", sync and account surfaces. OpenBook ships no
# first-party account service in Phase 1; keep neutral placeholders so no
# Mozilla-hosted endpoint name leaks into the UI.
syncBrandShortName=OpenBook Sync
