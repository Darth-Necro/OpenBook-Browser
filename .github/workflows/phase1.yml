name: "Phase 1 — Branding and Config"

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_full_firefox_build:
        description: "Set to 'true' to execute a full Firefox build"
        required: false
        default: "false"
      run_patch_apply_smoke:
        description: "Set to 'true' to fetch+verify upstream and test the patch series applies (no build — minutes, not hours)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  config-checks:
    name: "Phase 1 config checks"
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2 — pin to commit SHA for supply-chain hardening.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "Phase 1 structure validation"
        run: python3 tests/phase1/test_phase1_config.py

      - name: "Validate policies.json syntax"
        run: python3 -c "import json,sys; json.load(open('config/distribution/policies.json'))"

      - name: "openbook.cfg must start with a comment line"
        run: |
          head -1 config/autoconfig/openbook.cfg | grep -qE '^//'

      - name: "autoconfig.js must reference openbook.cfg"
        run: |
          grep -q 'openbook\.cfg' config/autoconfig/autoconfig.js

      - name: "install-config.sh must be executable and pass bash -n"
        run: |
          test -x build/scripts/install-config.sh
          bash -n build/scripts/install-config.sh

      - name: "First-run egress test scaffold parses and skips cleanly"
        run: |
          rc=0
          OPENBOOK_BIN= python3 tests/leak/test_first_run_egress.py || rc=$?
          [ "$rc" -eq 77 ] || { echo "expected SKIP exit 77, got $rc"; exit 1; }

  # Catches a stale patch series (the most common fork breakage) in minutes
  # without paying for a build: fetch + verify the pinned tarball, then run
  # apply-patches.sh, which fails hard on the first conflict. Run this after
  # every patch edit and on every upstream re-pin (RELEASE-CHECKLIST §3).
  patch-apply-smoke:
    name: "Patch series applies against pinned upstream (no build)"
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_patch_apply_smoke == 'true' || inputs.run_full_firefox_build == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: "Materialize Mozilla release signing keyring"
        shell: bash
        env:
          MOZILLA_RELEASE_KEYRING_B64: ${{ secrets.OPENBOOK_UPSTREAM_GPG_KEYRING_B64 }}
        run: |
          if [[ -z "${MOZILLA_RELEASE_KEYRING_B64:-}" ]]; then
            echo "::error::Set OPENBOOK_UPSTREAM_GPG_KEYRING_B64 (base64 of the Mozilla release signing keyring) first."
            exit 1
          fi
          keyring="$RUNNER_TEMP/mozilla-release-signing.gpg"
          printf '%s' "$MOZILLA_RELEASE_KEYRING_B64" | base64 -d > "$keyring"
          echo "OPENBOOK_UPSTREAM_GPG_KEYRING=$keyring" >> "$GITHUB_ENV"
      - name: "Fetch and verify upstream Firefox source"
        shell: bash
        run: build/scripts/fetch-verify-upstream.sh --dest "$RUNNER_TEMP/openbook-upstream"
      - name: "Apply the OpenBook patch series (fail hard on conflict)"
        shell: bash
        run: |
          build/scripts/apply-patches.sh \
            --source "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2"

  build-path:
    name: "Phase 1 full Firefox build (${{ matrix.target }})"
    needs: config-checks
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_full_firefox_build == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: macos-universal
            runner: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "Materialize Mozilla release signing keyring"
        shell: bash
        env:
          MOZILLA_RELEASE_KEYRING_B64: ${{ secrets.OPENBOOK_UPSTREAM_GPG_KEYRING_B64 }}
        run: |
          # A path-valued secret does not point at a real file on a hosted runner,
          # so decode a base64-encoded keyring secret into $RUNNER_TEMP and export
          # the real path. Fail closed if it is unset.
          if [[ -z "${MOZILLA_RELEASE_KEYRING_B64:-}" ]]; then
            echo "::error::Set OPENBOOK_UPSTREAM_GPG_KEYRING_B64 (base64 of the Mozilla release signing keyring) before running the full build."
            exit 1
          fi
          keyring="$RUNNER_TEMP/mozilla-release-signing.gpg"
          printf '%s' "$MOZILLA_RELEASE_KEYRING_B64" | base64 -d > "$keyring"
          echo "OPENBOOK_UPSTREAM_GPG_KEYRING=$keyring" >> "$GITHUB_ENV"

      - name: "Fetch and verify upstream Firefox source"
        shell: bash
        run: |
          build/scripts/fetch-verify-upstream.sh --dest "$RUNNER_TEMP/openbook-upstream"

      - name: "Apply patches"
        shell: bash
        run: |
          build/scripts/apply-patches.sh \
            --source "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2"

      - name: "Bootstrap Firefox toolchain"
        shell: bash
        run: |
          cd "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2"
          ./mach --no-interactive bootstrap --application-choice browser

      - name: "Build ${{ matrix.target }}"
        shell: bash
        run: |
          build/scripts/build.sh \
            --source "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2" \
            --target "${{ matrix.target }}"
