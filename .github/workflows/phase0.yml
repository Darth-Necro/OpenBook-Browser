name: Phase 0 Foundation Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_full_firefox_build:
        description: "Run full Firefox mach builds on matrix hosts"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

jobs:
  static-checks:
    name: Static Phase 0 checks
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2 — pin to commit SHA for supply-chain hardening.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate repository scaffold
        run: python3 tests/phase0/test_phase0_structure.py
      - name: Validate shell syntax
        run: find build/scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

  # Full Firefox builds require ~16GB RAM and ~50GB disk — beyond GitHub-hosted
  # runners. This job is intended for a self-hosted runner labeled
  # `openbook-build`; the `runs-on` matrix here is a placeholder until that
  # infrastructure is provisioned. See docs/DECISIONS.md ADR-0007.
  build-path:
    name: Unmodified Firefox build path (${{ matrix.target }})
    needs: static-checks
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_firefox_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: win-x64
            os: windows-latest
          - target: macos-universal
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Materialize Mozilla release signing keyring
        shell: bash
        env:
          MOZILLA_RELEASE_KEYRING_B64: ${{ secrets.OPENBOOK_UPSTREAM_GPG_KEYRING_B64 }}
        run: |
          # fetch-verify-upstream.sh requires OPENBOOK_UPSTREAM_GPG_KEYRING to point
          # at a readable keyring FILE. A secret holding a path would not correspond
          # to a real file on a hosted runner, so decode a base64-encoded keyring
          # secret into $RUNNER_TEMP and export the real path. Fail closed if unset.
          if [[ -z "${MOZILLA_RELEASE_KEYRING_B64:-}" ]]; then
            echo "::error::Set the OPENBOOK_UPSTREAM_GPG_KEYRING_B64 secret (base64 of the Mozilla release signing keyring) before running the full build."
            exit 1
          fi
          keyring="$RUNNER_TEMP/mozilla-release-signing.gpg"
          printf '%s' "$MOZILLA_RELEASE_KEYRING_B64" | base64 -d > "$keyring"
          echo "OPENBOOK_UPSTREAM_GPG_KEYRING=$keyring" >> "$GITHUB_ENV"
      - name: Fetch, verify, and build unmodified Firefox
        shell: bash
        run: |
          build/scripts/fetch-verify-upstream.sh --dest "$RUNNER_TEMP/openbook-upstream"
          build/scripts/apply-patches.sh --source "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2"
          cd "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2"
          ./mach --no-interactive bootstrap --application-choice browser
          cd "$GITHUB_WORKSPACE"
          build/scripts/build.sh --source "$RUNNER_TEMP/openbook-upstream/firefox-145.0.2" --target "${{ matrix.target }}"
