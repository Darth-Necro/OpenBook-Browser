;
; OpenBook distribution descriptor.
;
; Ships at <install>/distribution/distribution.ini alongside policies.json. The
; [Global] id/version/about strings identify this build as an OpenBook
; distribution to the application and appear in about:support. There are NO
; partner/attribution parameters here: OpenBook performs zero attribution
; telemetry and sends no partner identifiers (security invariant #1). The
; absence of any [Preferences] phone-home keys is deliberate.

[Global]
id=openbook
version=1.0
about=OpenBook

; No [Preferences] block: all preference hardening is owned by
; config/autoconfig/openbook.cfg (locked) and config/policies/policies.json.
; Distribution prefs are intentionally not used to set telemetry/partner values.

; No [LocalizablePreferences] block: OpenBook sets no distribution-scoped
; localizable homepage/search partner prefs. Homepage/search defaults come from
; policies.json and the branding pref file, all pointing at neutral values.
