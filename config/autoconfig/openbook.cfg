// ===========================================================================
// OpenBook hardened AutoConfig baseline.
// ===========================================================================
//
// HOW THIS FILE IS LOADED
//   Firefox AutoConfig: defaults/pref/autoconfig.js sets
//   general.config.filename = "openbook.cfg" and obscure_value = 0, which makes
//   the browser read THIS file (plaintext) from the application install root on
//   every startup. This is PRIVILEGED JavaScript executed with chrome
//   privileges, so:
//     * The FIRST LINE IS ALWAYS IGNORED by the parser — it must stay a comment.
//     * A syntax error here throws a startup error and the browser may refuse
//       to start. Keep it valid JS.
//     * Values MUST be real JS literals: false / true / 0 / 2 / "".
//       Never the strings "false" / "true" — they are truthy and silently wrong.
//
// FUNCTIONS USED
//   lockPref(name, value)    -> set default AND lock; user cannot change it.
//                               Used for security invariants that must hold.
//   defaultPref(name, value) -> set the default; user may still change it.
//                               Used where user agency matters (UX tradeoffs).
//   pref(name, value)        -> set the active value; used sparingly.
//   clearPref(name)          -> reset to built-in default (used to neutralize).
//
// SECURITY INVARIANT (docs/OpenBook-Browser-Build-Plan.md §11): this file and
// defaults/pref/*.js are privileged. They MUST be installed root-owned and NOT
// user-writable. A user-writable .cfg is a local code-execution hole. See the
// closing comment block and config/autoconfig/README.md.
//
// Hardening values are OpenBook's own, informed by arkenfox/user.js but not a
// copy of it. Every section documents intent and the lock-vs-default rationale.
// ===========================================================================


// ===========================================================================
// 1. TELEMETRY & DATA REPORTING — fully OFF and LOCKED.
//    Invariant #1: zero telemetry, no unsolicited egress. These are locked so
//    no profile setting, policy drift, or add-on can turn collection back on.
//    The empty-string server prefs guarantee there is no endpoint to reach even
//    if some code path ignores the enable flags.
// ===========================================================================
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.unified", false);
lockPref("toolkit.telemetry.server", "");
lockPref("toolkit.telemetry.archive.enabled", false);
lockPref("toolkit.telemetry.newProfilePing.enabled", false);
lockPref("toolkit.telemetry.updatePing.enabled", false);
lockPref("toolkit.telemetry.bhrPing.enabled", false);
lockPref("toolkit.telemetry.firstShutdownPing.enabled", false);
lockPref("toolkit.telemetry.shutdownPingSender.enabled", false);
lockPref("toolkit.telemetry.coverage.opt-out", true);
// Coverage ping endpoint: empty so there is nowhere to phone home.
lockPref("toolkit.coverage.endpoint.base", "");
lockPref("toolkit.coverage.opt-out", true);
// Health report upload + the data-submission policy gate that governs ALL
// data reporting. Locking dataSubmissionEnabled off is the master kill switch.
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("datareporting.healthreport.service.enabled", false);
// Studies / Shield / Normandy remote experiment delivery — OFF and no API URL.
lockPref("app.shield.optoutstudies.enabled", false);
lockPref("app.normandy.enabled", false);
lockPref("app.normandy.api_url", "");
// Discovery / "recommended by" personalization telemetry.
lockPref("browser.discovery.enabled", false);
// New-tab (Activity Stream) telemetry feeds.
lockPref("browser.newtabpage.activity-stream.feeds.telemetry", false);
lockPref("browser.newtabpage.activity-stream.telemetry", false);
lockPref("browser.ping-centre.telemetry", false);
// PingCentre / structured-ingestion endpoints blanked as defense in depth.
lockPref("browser.newtabpage.activity-stream.telemetry.ut.events", false);
// Attribution / dapTelemetry (privacy-preserving ad measurement) — off.
lockPref("toolkit.telemetry.dap_enabled", false);
lockPref("dom.private-attribution.submission.enabled", false);


// ===========================================================================
// 2. CRASH REPORTING — no automatic submission.
//    Breakpad/crash-reporter must never auto-upload a minidump (it can contain
//    memory contents). No submit URL is configured. Crash reporting stays a
//    local-only artifact unless a user manually opts in per-crash.
// ===========================================================================
lockPref("breakpad.reportURL", "");
lockPref("browser.tabs.crashReporting.sendReport", false);
lockPref("browser.crashReports.unsubmittedCheck.enabled", false);
lockPref("browser.crashReports.unsubmittedCheck.autoSubmit2", false);


// ===========================================================================
// 3. CAPTIVE PORTAL & CONNECTIVITY PHONE-HOME — OFF.
//    Firefox normally pings detectportal.firefox.com and a connectivity-check
//    endpoint on startup/network change. That is an unsolicited outbound
//    connection (invariant #1), so both services are disabled and the captive
//    portal probe URL is blanked.
// ===========================================================================
lockPref("network.captive-portal-service.enabled", false);
lockPref("network.connectivity-service.enabled", false);
lockPref("captivedetect.canonicalURL", "");


// ===========================================================================
// 4. SAFE BROWSING — keep MALWARE/PHISHING protection, drop the chatty bits.
//    TRADEOFF, stated honestly: Safe Browsing is a genuine security feature
//    (blocks known malware/phishing) and Firefox's implementation is
//    privacy-preserving for the common case — it downloads hashed block LISTS
//    and checks locally; full URLs are only sent (hashed) on a partial hash
//    match. We therefore KEEP Safe Browsing ENABLED by default for user safety.
//    We disable the pieces that send extra identifiers / reporting we do not
//    need: "report a problem" submission, allow-list reporting, and download
//    reputation lookups that contact Google with more metadata. The provider
//    update/list URLs are LEFT INTACT so protection keeps working; only the
//    reporting/telemetry-ish URLs are blanked. Users who want zero Safe Browsing
//    contact can flip browser.safebrowsing.* off in about:config (not locked).
// ===========================================================================
defaultPref("browser.safebrowsing.malware.enabled", true);
defaultPref("browser.safebrowsing.phishing.enabled", true);
// Block downloaded-malware checks that send extra metadata to the reputation
// service. Off by default to minimize egress; this is a privacy>convenience
// call and is documented as such. Not locked.
defaultPref("browser.safebrowsing.downloads.remote.enabled", false);
defaultPref("browser.safebrowsing.downloads.remote.url", "");
// Reporting URLs (used by "report this site" UI): blanked, not needed.
defaultPref("browser.safebrowsing.reportPhishMistakeURL", "");
defaultPref("browser.safebrowsing.reportMalwareMistakeURL", "");
defaultPref("browser.safebrowsing.reportPhishURL", "");
// NOTE: browser.safebrowsing.provider.*.updateURL / gethashURL are intentionally
// NOT overridden so the local block lists still update and protection works.


// ===========================================================================
// 5. ANTI-FINGERPRINTING & TRACKING PROTECTION.
//    LOCK vs DEFAULT rationale: resistFingerprinting (RFP) is powerful but has
//    a real UX cost (letterboxing, forced light theme/timezone, blocked canvas,
//    reduced screen/locale signals, some sites misbehave). We therefore set it
//    as a DEFAULT (defaultPref), ON, so OpenBook ships hardened out of the box
//    but a user who hits breakage can disable it in about:config. Tracking
//    Protection (network-level blocklist) has a far lower UX cost, so it is on
//    by default too; we leave it unlocked so power users can tune it.
// ===========================================================================
// Resist Fingerprinting: ON by default, user-overridable (see rationale above).
defaultPref("privacy.resistFingerprinting", true);
// Don't letterbox-resize on every window dimension change quite so aggressively
// while still rounding the content window to reduce the screen-size signal.
defaultPref("privacy.resistFingerprinting.letterboxing", true);
// Newer per-origin fingerprinting protection layer (works alongside/short of RFP
// where RFP is too heavy). On by default.
defaultPref("privacy.fingerprintingProtection", true);
// Enhanced Tracking Protection (blocklist) on by default, strict-style behavior.
defaultPref("privacy.trackingprotection.enabled", true);
defaultPref("privacy.trackingprotection.pbmode.enabled", true);
defaultPref("privacy.trackingprotection.socialtracking.enabled", true);
defaultPref("privacy.trackingprotection.cryptomining.enabled", true);
defaultPref("privacy.trackingprotection.fingerprinting.enabled", true);
// Cookie behavior 5 = "dFPI"/Total Cookie Protection: isolate third-party
// cookies per top-level site, block known trackers. Best balance of breakage
// vs. cross-site tracking resistance. Default (not locked) so users can relax.
defaultPref("network.cookie.cookieBehavior", 5);
// First-party isolation: RFP already implies strong isolation, and enabling FPI
// on top of cookieBehavior 5 causes redundant breakage. Left at its default OFF
// here and called out so the choice is explicit, not accidental.
//   (privacy.firstparty.isolate is intentionally NOT set; dFPI above is the
//    chosen isolation mechanism.)
// Referrer trimming: send only the origin cross-site, reduces leakage.
defaultPref("network.http.referer.XOriginTrimmingPolicy", 2);
defaultPref("network.http.referer.XOriginPolicy", 2);
// Query-parameter stripping for known tracking params (utm_*, etc.).
defaultPref("privacy.query_stripping.enabled", true);
defaultPref("privacy.query_stripping.enabled.pbmode", true);


// ===========================================================================
// 6. DNS / CONNECTION PRIVACY.
//    DoH (Trusted Recursive Resolver) is enabled by DEFAULT in mode 2
//    ("DoH with classic DNS fallback") so first-party DNS isn't sent in the
//    clear to whatever the LAN hands out. The resolver URI is a NEUTRAL default
//    and is USER-CHANGEABLE (defaultPref, not locked) — pick your own resolver
//    in Settings. We deliberately do not hard-lock a single resolver: that would
//    centralize all DNS to one party, which is its own privacy problem.
// ===========================================================================
// trr.mode 2 = DoH preferred, fall back to system DNS on failure.
//   (Mode 3 = DoH only/no fallback; left to the proxy-manager / advanced users
//    because it can break captive networks. Mode 5 = explicitly off.)
defaultPref("network.trr.mode", 2);
// Neutral default resolver. Documented, user-changeable. Quad9 is privacy-policy
// friendly and filters known-malicious domains; swap freely in Settings.
defaultPref("network.trr.uri", "https://dns.quad9.net/dns-query");
defaultPref("network.trr.default_provider_uri", "https://dns.quad9.net/dns-query");
// When SOCKS is in use, resolve DNS through the proxy (no local DNS leak). This
// is part of the leak-control story owned by proxy-manager (§6) but a safe
// default to set globally. Locked: leaking DNS around a SOCKS proxy is never
// what a privacy user wants.
lockPref("network.proxy.socks_remote_dns", true);
// Speculative / predictive connections that touch the network before the user
// commits to navigating — disabled to avoid leaking intent and warming
// connections to hosts the user never visits.
lockPref("network.dns.disablePrefetch", true);
lockPref("network.dns.disablePrefetchFromHTTPS", true);
lockPref("network.predictor.enabled", false);
lockPref("network.prefetch-next", false);
lockPref("browser.urlbar.speculativeConnect.enabled", false);
lockPref("network.http.speculative-parallel-limit", 0);


// ===========================================================================
// 7. POCKET, SPONSORED CONTENT, RECOMMENDATIONS, FIRST-RUN NAG.
//    None of these are security features; all of them either phone home, inject
//    sponsored content, or nag. Disabled. Pocket is locked off (it is a remote
//    service); the rest are defaults so users may re-enable specific surfaces.
// ===========================================================================
lockPref("extensions.pocket.enabled", false);
lockPref("extensions.pocket.api", "");
lockPref("extensions.pocket.site", "");
// Sponsored / "top stories" / shopping surfaces on the new-tab page.
defaultPref("browser.newtabpage.activity-stream.showSponsored", false);
defaultPref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
defaultPref("browser.newtabpage.activity-stream.feeds.section.topstories", false);
defaultPref("browser.newtabpage.activity-stream.feeds.topsites", false);
defaultPref("browser.newtabpage.activity-stream.section.highlights.includePocket", false);
// Sponsored shopping price-comparison experience.
defaultPref("browser.shopping.experience2023.enabled", false);
// First-run "welcome"/onboarding tour and post-update marketing pages.
defaultPref("browser.aboutwelcome.enabled", false);
lockPref("browser.startup.upgradeDialog.enabled", false);
lockPref("trailhead.firstrun.branches", "nofirstrun-empty");
// Default-browser nagging / agent.
defaultPref("browser.shell.checkDefaultBrowser", false);
lockPref("default-browser-agent.enabled", false);
// "Recommend extensions/features as you browse" (uses a remote recommender).
defaultPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.addons", false);
defaultPref("browser.newtabpage.activity-stream.asrouter.userprefs.cfr.features", false);
lockPref("extensions.htmlaboutaddons.recommendations.enabled", false);
lockPref("extensions.getAddons.showPane", false);


// ===========================================================================
// 8. SEARCH SUGGESTIONS & LOCATION-BAR LEAKAGE.
//    Keystrokes in the address bar can be sent to the search provider as
//    suggestions. That is a per-keystroke egress; we DEFAULT it OFF but leave it
//    user-changeable (it's a genuine convenience some users want). Sponsored and
//    "quick suggest"/Firefox Suggest results (which involve remote sponsored
//    data) are off. keyword.enabled (search non-URL entries) is left ON as a
//    default because turning it off breaks normal "type a word, hit enter".
// ===========================================================================
defaultPref("browser.search.suggest.enabled", false);
defaultPref("browser.urlbar.suggest.searches", false);
// Firefox Suggest / sponsored & "quick suggest" results: off (remote sponsored).
defaultPref("browser.urlbar.quicksuggest.enabled", false);
defaultPref("browser.urlbar.suggest.quicksuggest.sponsored", false);
defaultPref("browser.urlbar.suggest.quicksuggest.nonsponsored", false);
defaultPref("browser.urlbar.sponsoredTopSites", false);
// Trending/most-visited suggestions that may call out — off by default.
defaultPref("browser.urlbar.suggest.trending", false);
defaultPref("browser.urlbar.trending.featureGate", false);
// Don't fetch search-engine suggestions on the new tab page.
defaultPref("browser.newtabpage.activity-stream.improvesearch.handoffToAwesomebar", false);
// keyword.enabled left ON (default) intentionally — see section note above.
defaultPref("keyword.enabled", true);
// Don't send the search query to the suggestion endpoint in private windows.
defaultPref("browser.search.suggest.enabled.private", false);


// ===========================================================================
// 9. WebRTC — POLICY OWNED BY proxy-manager (§6). DO NOT BLANKET-DISABLE HERE.
//    Per docs/OpenBook-Browser-Build-Plan.md §6, the proxy-manager extension
//    owns the WebRTC leak policy (disable vs. force-through-proxy) because it
//    depends on whether a proxy/tunnel is active. Disabling WebRTC outright here
//    would break video calls for users with no proxy and would fight the
//    extension. We set ONLY one conservative default: when ICE gathers
//    candidates, default to a single (proxy-safe) address rather than enumerating
//    every local interface, which limits passive local-IP disclosure. Everything
//    else about WebRTC is deferred to proxy-manager.
// ===========================================================================
defaultPref("media.peerconnection.ice.default_address_only", true);
// (media.peerconnection.enabled is intentionally NOT set here — proxy-manager
//  decides whether to disable or proxy WebRTC based on tunnel state.)


// ===========================================================================
// 10. MISC PRIVACY HARDENING.
// ===========================================================================
// Navigator.sendBeacon — used almost exclusively for analytics/exit pings. Off.
lockPref("beacon.enabled", false);
// Geolocation: OFF by default but user-changeable (a user may legitimately want
// maps). defaultPref so the prompt path still works if they re-enable it. The
// geo provider URL is blanked so even an accidental enable has no Google/Mozilla
// location endpoint to call.
defaultPref("geo.enabled", false);
lockPref("geo.provider.network.url", "");
lockPref("geo.provider.ml.enabled", false);
lockPref("browser.region.network.url", "");
lockPref("browser.region.update.enabled", false);
// HTTPS-Only mode: upgrade all navigation to HTTPS and warn on downgrade.
// Locked on — this is a strong, low-breakage security win in 2026.
lockPref("dom.security.https_only_mode", true);
lockPref("dom.security.https_only_mode_pbm", true);
// WebGL: a strong fingerprinting and attack surface. TRADEOFF: fully disabling
// WebGL breaks maps/games/3D. We keep it ENABLED by default (so the web works)
// but leave it user-changeable; privacy-maximalists can set webgl.disabled=true
// in about:config. RFP (section 5) already reduces WebGL fingerprint entropy.
//   webgl.disabled is intentionally NOT locked; documented tradeoff.
defaultPref("webgl.disabled", false);
// Disable the link "ping" attribute tracking.
lockPref("browser.send_pings", false);
// Don't expose battery status / reduce other sensor surfaces.
lockPref("dom.battery.enabled", false);
// Disable Web-based push notifications' remote connection by default
// (re-enabled per-site by the user when they grant notification permission).
defaultPref("dom.push.enabled", false);
// Trim the User-Agent / navigator surface where Firefox supports it.
defaultPref("privacy.resistFingerprinting.block_mozAddonManager", true);
// Don't save extra recently-closed/session data that could leak after "clear".
defaultPref("browser.sessionstore.privacy_level", 2);
// Disable form autofill of credit-card data by default (sensitive at rest).
defaultPref("extensions.formautofill.creditCards.enabled", false);


// ===========================================================================
// 11. UPDATES — IN-APP UPDATER OFF; UPDATES FLOW VIA PACKAGE CHANNELS
//    (ADR-0013 / ADR-0018). OpenBook runs no AUS/Balrog update server. The
//    compiled-in update endpoint is Mozilla's (aus5.mozilla.org): leaving the
//    updater on would (a) phone an unsolicited third-party endpoint on a timer
//    — an invariant-1 violation — and (b) offer STOCK FIREFOX MARs to an
//    OpenBook install. Security updates still flow, through the signed
//    deb/rpm/Flatpak/winget/Homebrew channels with a 1–2 day SLA tracked via
//    MFSA (ci/mfsa-track.sh). Policy `DisableAppUpdate: true` is the
//    authoritative switch; these prefs are defense in depth. Revisit when
//    self-hosted signed-MAR infrastructure exists (Build Plan §9 Option 1/3).
// ===========================================================================
lockPref("app.update.auto", false);
// No background update agent (separate scheduled task on Windows).
lockPref("app.update.background.scheduling.enabled", false);

// ===========================================================================
// 12. REMAINING BACKGROUND EGRESS — DISABLED OR DOCUMENTED (invariant 1).
//    Every endpoint a fresh profile may contact must be either disabled here
//    or listed as a documented exception with its rationale. The first-run
//    egress test (tests/privacy-regression/FIRST_RUN_EGRESS.md) enforces the
//    sum of these decisions against a real build.
// ===========================================================================
// System add-on updates: OpenBook ships and updates its bundled system
// extensions through its own releases, never via Mozilla's system-addon
// pipeline (which can silently swap privileged code — Mr. Robot taught us).
lockPref("extensions.systemAddon.update.enabled", false);
lockPref("extensions.systemAddon.update.url", "");
//
// DOCUMENTED EXCEPTIONS (deliberately left enabled; each is a security or
// core-function service, first-party to its purpose, and carries no browsing
// history):
//   * Remote Settings (firefox.settings.services.mozilla.com) — delivers
//     OneCRL certificate revocations and similar security state. Disabling it
//     would leave revoked CAs trusted; that trade is not acceptable.
//   * Safe Browsing list updates — see section 4's rationale (hash-prefix
//     model, no URLs sent); user-disableable in Settings.
//   * GMP plugin updates (media.gmp-manager) — OpenH264/Widevine binaries on
//     explicit demand for WebRTC calls / DRM video the user plays.
//   * Add-on update checks for USER-INSTALLED extensions (AMO) — unpatched
//     extensions are a worse privacy outcome than the version ping; OpenBook's
//     own bundled extensions are excluded (system-addon pipeline off above,
//     and they update with the browser package).
//   * DoH resolver traffic + its connectivity confirmation — to the resolver
//     the USER configured (Quad9 default, changeable; section 5).


// ===========================================================================
// CLOSING NOTE — PERMISSIONS INVARIANT (docs/OpenBook-Browser-Build-Plan.md §4
// and §11):
//
//   This file (openbook.cfg) lives at the application INSTALL ROOT and, together
//   with defaults/pref/autoconfig.js, is executed as PRIVILEGED chrome
//   JavaScript at startup. If the install directory is user-writable, an
//   adversary can rewrite this file and obtain local code execution. Therefore
//   release packaging MUST install this file and defaults/pref/*.js:
//       - owned by root (or the platform's admin/SYSTEM principal),
//       - mode 0644 (readable, NOT writable by non-root users),
//       - in a directory that is itself not user-writable.
//   Any deviation is a RELEASE BLOCKER. The privacy-regression and packaging
//   tests assert these properties.
//
//   Policy duplication: several locks here are also expressed in
//   config/policies/policies.json as defense in depth. That redundancy is
//   intentional — see config/policies/README.md.
// ===========================================================================

// ===========================================================================
// AI features — OFF BY DEFAULT (security invariant 5).
// OpenBook ships no AI provider and makes no model or network calls until the
// user explicitly opts in via the ai-sidebar extension. Lock Firefox's built-in
// ML/AI features off so nothing runs implicitly.
lockPref("browser.ml.enable", false);
lockPref("browser.ml.chat.enabled", false);
lockPref("browser.ml.chat.menu", false);
lockPref("browser.ml.linkPreview.enabled", false);
lockPref("browser.tabs.groups.smart.enabled", false);
lockPref("extensions.ml.enabled", false);


// ===========================================================================
// 13. LibreWolf-EQUIVALENT BASELINE ADDITIONS (ADR-0009).
//    Defense-in-depth prefs adopted from the LibreWolf-equivalent baseline that
//    the sections above did not already cover. NOTE: unlike a stock LibreWolf
//    baseline, OpenBook deliberately KEEPS Safe Browsing ENABLED (section 4 —
//    malware/phishing protection is a net user-safety win and Firefox's
//    implementation is hash-list based), so the SafeBrowsing-disable block is
//    intentionally NOT included here.
// ===========================================================================
// Built-in AI/ML surfaces — blank the provider/model endpoints too (off-by-
// default is also enforced in the AI block above; invariant 5).
lockPref("browser.ml.chat.provider", "");
lockPref("browser.ml.chat.shortcuts", false);
lockPref("browser.ml.modelHubRootUrl", "");
lockPref("browser.ai.chatEnabled", false);
lockPref("browser.urlbar.quicksuggest.remoteSettings.enabled", false);
lockPref("browser.urlbar.quicksuggest.dataCollection.enabled", false);
// EME / Widevine: default OFF at runtime too (release builds also pass
// --disable-eme). User-overridable for DRM video they choose to play.
defaultPref("media.eme.enabled", false);
defaultPref("media.gmp-widevinecdm.enabled", false);
// Anti-homograph: always show punycode for IDN look-alike domains.
defaultPref("network.IDN_show_punycode", true);
// HTTPS-Only: don't send the background plaintext probe request.
defaultPref("dom.security.https_only_mode_send_http_background_request", false);
// Addon recommendation cache and formless credential capture.
lockPref("extensions.getAddons.cache.enabled", false);
defaultPref("signon.formlessCapture.enabled", false);
// PDF.js scripting surface (attack surface; off by default).
defaultPref("pdfjs.enableScripting", false);
// First-run / welcome / "what's new" messaging surfaces (no remote nags).
lockPref("browser.uitour.enabled", false);
lockPref("startup.homepage_welcome_url", "");
lockPref("startup.homepage_welcome_url.additional", "");
lockPref("startup.homepage_override_url", "");
lockPref("browser.startup.homepage_override.mstone", "ignore");
lockPref("browser.messaging-system.whatsNewPanel.enabled", false);
// New-tab feeds not already covered above.
defaultPref("browser.newtabpage.activity-stream.feeds.snippets", false);
defaultPref("browser.newtabpage.activity-stream.feeds.system.topstories", false);
// ===========================================================================
